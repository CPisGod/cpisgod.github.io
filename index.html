<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>메모장</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f5f0;
      font-family: 'Noto Sans KR', sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── 사이드바 ── */
    #sidebar {
      width: 220px;
      min-width: 220px;
      background: #222;
      color: #ddd;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #sidebar-header {
      padding: 16px 14px 10px;
      font-size: 11px;
      letter-spacing: 2px;
      color: #777;
      text-transform: uppercase;
      border-bottom: 1px solid #333;
    }
    #new-btn {
      margin: 12px 10px;
      background: #444;
      color: #eee;
      border: none;
      padding: 8px 0;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      cursor: pointer;
      width: calc(100% - 20px);
    }
    #new-btn:hover { background: #555; }
    #memo-list { flex: 1; overflow-y: auto; }
    .memo-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid #2e2e2e;
      font-size: 13px;
      color: #bbb;
    }
    .memo-item:hover { background: #2a2a2a; }
    .memo-item.active { background: #333; color: #fff; }
    .memo-item-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .delete-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 16px;
      cursor: pointer;
      padding: 0 0 0 8px;
      line-height: 1;
    }
    .delete-btn:hover { color: #f55; }
    #status {
      padding: 10px 14px;
      font-size: 11px;
      color: #555;
      border-top: 1px solid #2a2a2a;
      min-height: 34px;
    }

    /* ── 메인 ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 20px 24px;
      overflow: hidden;
    }
    #empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #bbb;
      font-size: 15px;
    }
    #title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    #title-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 2px solid #aaa;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 20px;
      font-weight: bold;
      color: #222;
      outline: none;
      padding: 4px 0;
    }
    #title-input:focus { border-bottom-color: #000; }
    #title-input::placeholder { color: #ccc; }
    #save-btn {
      background: #333;
      color: #fff;
      border: none;
      padding: 8px 20px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    #save-btn:hover { background: #000; }
    #save-btn:disabled { background: #aaa; cursor: default; }

    /* ── 에디터 래퍼 (줄번호 + 핀 + textarea) ── */
    #editor-wrap {
      flex: 1;
      display: flex;
      border: 2px solid #333;
      background: #fffffe;
      overflow: hidden;
    }
    #editor-wrap:focus-within { border-color: #000; }

    /* 핀 거터 */
    #gutter {
      width: 28px;
      min-width: 28px;
      background: #f0f0ec;
      border-right: 1px solid #ddd;
      overflow: hidden;
      position: relative;
      cursor: default;
      user-select: none;
    }
    .gutter-line {
      height: var(--lh);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .gutter-line:hover .pin-dot { opacity: 0.35; }
    .pin-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #e03131;
      opacity: 0;
      transition: opacity 0.1s;
      flex-shrink: 0;
    }
    .pin-dot.active { opacity: 1 !important; }

    /* textarea */
    #memo {
      flex: 1;
      border: none;
      background: transparent;
      padding: 0 20px;
      font-family: 'Noto Serif KR', serif;
      font-size: 16px;
      line-height: var(--lh-num);
      color: #222;
      resize: none;
      outline: none;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #bottom-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <!-- 사이드바 -->
  <div id="sidebar">
    <div id="sidebar-header">MEMOS</div>
    <button id="new-btn">+ 새 메모</button>
    <div id="memo-list"></div>
    <div id="status">⏳ 연결 중...</div>
  </div>

  <!-- 메인 -->
  <div id="main">
    <div id="empty-state">← 메모를 선택하거나 새로 만드세요</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, remove, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyDgjizBR_P_ccjZczxcvCLmVuUi2wKIQYU",
      authDomain:        "memo-acd0e.firebaseapp.com",
      databaseURL:       "https://memo-acd0e-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId:         "memo-acd0e",
      storageBucket:     "memo-acd0e.firebasestorage.app",
      messagingSenderId: "116520806995",
      appId:             "1:116520806995:web:abbafb950052296db8b4a6",
      measurementId:     "G-9H3GX7SWKG"
    };

    const app      = initializeApp(firebaseConfig);
    const db       = getDatabase(app);
    const memosRef = ref(db, "memos");

    const memoListEl = document.getElementById("memo-list");
    const mainDiv    = document.getElementById("main");
    const statusEl   = document.getElementById("status");
    const newBtn     = document.getElementById("new-btn");

    // 줄 높이 상수 (CSS와 맞춰야 함)
    const LINE_HEIGHT_PX  = 38;   // 16px * 2.0 + padding 보정
    const LINE_HEIGHT_NUM = 2.2;

    let memos     = {};
    let currentId = null;
    let editorEl  = null;
    let titleEl   = null;
    let gutterEl  = null;
    // pins: { memoId: Set<lineIndex> }
    let pins      = {};

    function getPins(id) {
      if (!pins[id]) pins[id] = new Set();
      return pins[id];
    }

    // ── 거터 렌더링 ──
    function renderGutter() {
      if (!gutterEl || !editorEl) return;
      const text      = editorEl.value;
      const lineCount = Math.max(text.split("\n").length, 1);
      const pinSet    = getPins(currentId);

      gutterEl.innerHTML = "";
      gutterEl.style.setProperty("--lh", LINE_HEIGHT_PX + "px");

      for (let i = 0; i < lineCount; i++) {
        const row = document.createElement("div");
        row.className = "gutter-line";
        row.style.height = LINE_HEIGHT_PX + "px";

        const dot = document.createElement("div");
        dot.className = "pin-dot" + (pinSet.has(i) ? " active" : "");

        row.appendChild(dot);
        row.addEventListener("click", () => togglePin(i));
        gutterEl.appendChild(row);
      }
    }

    function togglePin(lineIdx) {
      const pinSet = getPins(currentId);
      if (pinSet.has(lineIdx)) pinSet.delete(lineIdx);
      else pinSet.add(lineIdx);
      renderGutter();
    }

    // ── 에디터 마운트 ──
    function mountEditor() {
      mainDiv.innerHTML = `
        <div id="title-row">
          <input id="title-input" type="text" placeholder="제목 없음" maxlength="80" />
          <button id="save-btn">저장</button>
        </div>
        <div id="editor-wrap">
          <div id="gutter"></div>
          <textarea id="memo" placeholder="여기에 메모를 입력하세요..."></textarea>
        </div>
        <div id="bottom-row"><span id="charcount">0자</span></div>
      `;

      editorEl = document.getElementById("memo");
      titleEl  = document.getElementById("title-input");
      gutterEl = document.getElementById("gutter");

      // CSS 변수 설정
      editorEl.style.setProperty("--lh-num", LINE_HEIGHT_NUM);
      editorEl.style.lineHeight = LINE_HEIGHT_NUM;

      document.getElementById("save-btn").addEventListener("click", save);

      // Ctrl+S — 어디서든
      document.addEventListener("keydown", globalSave);

      editorEl.addEventListener("input", () => {
        document.getElementById("charcount").textContent = editorEl.value.length + "자";
        renderGutter();
      });

      // 스크롤 동기화 (거터 ↔ textarea)
      editorEl.addEventListener("scroll", () => {
        gutterEl.scrollTop = editorEl.scrollTop;
      });
    }

    function globalSave(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === "s") {
        e.preventDefault();
        save();
      }
    }

    // ── 메모 선택 ──
    function selectMemo(id) {
      currentId = id;
      if (!editorEl) mountEditor();
      const m = memos[id] || {};
      titleEl.value  = m.title   || "";
      editorEl.value = m.content || "";
      document.getElementById("charcount").textContent = (m.content || "").length + "자";
      renderGutter();
      renderList();
      editorEl.focus();
    }

    // ── 저장 ──
    function save() {
      if (!currentId) return;
      const saveBtn = document.getElementById("save-btn");
      if (!saveBtn) return;
      saveBtn.disabled = true;
      saveBtn.textContent = "저장 중...";
      const title   = titleEl.value.trim() || "제목 없음";
      const content = editorEl.value;
      set(ref(db, `memos/${currentId}`), { title, content })
        .then(() => {
          statusEl.textContent = "✅ " + new Date().toLocaleTimeString();
          saveBtn.textContent = "저장";
          saveBtn.disabled = false;
        })
        .catch((e) => {
          statusEl.textContent = "❌ " + e.message;
          saveBtn.textContent = "저장";
          saveBtn.disabled = false;
        });
    }

    // ── 새 메모 ──
    newBtn.addEventListener("click", () => {
      const newRef = push(memosRef);
      set(newRef, { title: "새 메모", content: "" }).then(() => {
        selectMemo(newRef.key);
      });
    });

    // ── 삭제 ──
    function deleteMemo(id) {
      if (!confirm("이 메모를 삭제할까요?")) return;
      remove(ref(db, `memos/${id}`)).then(() => {
        if (currentId === id) {
          document.removeEventListener("keydown", globalSave);
          currentId = null; editorEl = null; titleEl = null; gutterEl = null;
          mainDiv.innerHTML = '<div id="empty-state" style="flex:1;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:15px;">← 메모를 선택하거나 새로 만드세요</div>';
        }
      });
    }

    // ── 목록 렌더링 ──
    function renderList() {
      memoListEl.innerHTML = "";
      const ids = Object.keys(memos);
      if (ids.length === 0) {
        memoListEl.innerHTML = '<div style="padding:12px 14px;color:#555;font-size:12px;">메모 없음</div>';
        return;
      }
      ids.forEach(id => {
        const m    = memos[id];
        const item = document.createElement("div");
        item.className = "memo-item" + (id === currentId ? " active" : "");
        const titleSpan = document.createElement("span");
        titleSpan.className   = "memo-item-title";
        titleSpan.textContent = m.title || "제목 없음";
        const delBtn = document.createElement("button");
        delBtn.className   = "delete-btn";
        delBtn.textContent = "×";
        delBtn.addEventListener("click", (e) => { e.stopPropagation(); deleteMemo(id); });
        item.appendChild(titleSpan);
        item.appendChild(delBtn);
        item.addEventListener("click", () => selectMemo(id));
        memoListEl.appendChild(item);
      });
    }

    // ── Firebase 실시간 동기화 ──
    onValue(memosRef, (snapshot) => {
      memos = snapshot.val() || {};
      statusEl.textContent = "✅ 연결됨";
      renderList();
      if (currentId && memos[currentId] && editorEl) {
        if (document.activeElement !== editorEl && document.activeElement !== titleEl) {
          titleEl.value  = memos[currentId].title   || "";
          editorEl.value = memos[currentId].content || "";
          renderGutter();
        }
      }
    }, (error) => {
      statusEl.textContent = "❌ " + error.message;
    });
  </script>
</body>
</html>
